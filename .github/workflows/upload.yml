name: Upload YouTube Short

on:
  schedule:
    # 5 uploads spread across the day (UTC times)
    # Adjust these for your timezone
    - cron: '0 8 * * *'    # 8:00 AM UTC
    - cron: '30 10 * * *'  # 10:30 AM UTC
    - cron: '0 13 * * *'   # 1:00 PM UTC
    - cron: '0 16 * * *'   # 4:00 PM UTC
    - cron: '30 19 * * *'  # 7:30 PM UTC

  workflow_dispatch:  # Manual run button

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Upload one video
        run: node upload.js
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          POSTED_FOLDER_ID: ${{ secrets.POSTED_FOLDER_ID }}

      - name: Save quota
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quota.json
          git diff --staged --quiet || git commit -m "Update quota $(date +%Y-%m-%d)"
          git push
